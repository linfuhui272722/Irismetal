modLoader = "javafml"
loaderVersion = "*"
license = "LGPL-3.0-only"

[[mods]]
modId = "iris"

version = "${version}"
displayName = "Iris"

logoFile = "iris-logo.png" #optional

authors = "coderbot, IMS212"

description = '''
Iris is a modern shaders mod for Minecraft intended to be compatible with existing OptiFine shader packs.
'''

[[dependencies.iris]]
modId = "minecraft"
type = "required"
versionRange = "[1.21.3,)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.iris]]
modId = "neoforge"
type = "required"
versionRange = "[21.3.9-beta,)"
ordering = "NONE"
side = "CLIENT"

[[mixins]]
config = "mixins.iris.json"

[[mixins]]
config = "mixins.iris.vertexformat.json"

[[mixins]]
config = "mixins.iris.compat.sodium.json"

[[mixins]]
config = "mixins.iris.compat.dh.json"

[[mixins]]
config = "mixins.iris.forge.json"

[mods."sodium:options"]
"mixin.features.render.world.sky" = false

[modproperties.iris]
"sodium:config_api_user" = "net.irisshaders.iris.compat.sodium.config.IrisConfig"

[[dependencies.iris]]
modId = "embeddium"
type = "incompatible"
reason = "Iris and Embeddium cannot be used together. Please use Sodium 0.6 instead."
versionRange = "[0.0.1,)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.iris]]
modId = "sodium"
type = "required"
reason = "Iris requires Sodium. Please install Sodium 0.6 for Iris to work."
versionRange = "[0.6,)"
ordering = "NONE"
side = "CLIENT"
